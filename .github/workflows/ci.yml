name: CI/CD Pipeline - TP DevOps UCAD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================
  # JOB 1 : Build et Tests
  # ============================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Récupérer le code source
      - name: Checkout code
        uses: actions/checkout@v3

      # Étape 2 : Configurer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      # Étape 3 : Installer les dépendances
      - name: Install dependencies
        run: npm install

      # Étape 4 : Lancer les tests (déploiement bloqué si échec)
      - name: Run tests
        run: npm test

      # Étape 5 : Build de l'application
      - name: Build application
        run: npm run build --if-present

  # ============================================================
  # JOB 2 : Docker Build & Push (Bonus)
  # Se déclenche UNIQUEMENT si les tests passent
  # ============================================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test  # Dépend du job build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tp-devops-app:latest

  # ============================================================
  # JOB 3 : Déploiement SSH sur serveur (Avancé)
  # Se déclenche UNIQUEMENT si build-and-test réussit
  # ============================================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-test  # Ne se déclenche que si les tests passent
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Déploiement via SSH
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            # Se déplacer dans le répertoire du projet
            cd /var/www/tp-devops-app || mkdir -p /var/www/tp-devops-app && cd /var/www/tp-devops-app

            # Mettre à jour le code
            git pull origin main

            # Installer les dépendances
            npm install --production

            # Redémarrer avec PM2 (gestionnaire de processus Node.js)
            pm2 restart tp-devops-app || pm2 start src/app.js --name tp-devops-app

            echo "Déploiement terminé avec succès !"

name: CI/CD Pipeline - TP DevOps UCAD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================
  # JOB 1 : Build et Tests
  # ============================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build --if-present

  # ============================================================
  # JOB 2 : Docker Build & Push (Bonus)
  # Se déclenche UNIQUEMENT si les tests passent
  # ============================================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.salifthiongane }}
          password: ${{ secrets.S@lif171120 }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tp-devops-app:latest

  # ============================================================
  # JOB 3 : Déploiement SSH sur serveur (Avancé)
  # Se déclenche UNIQUEMENT si build-and-test réussit
  # ============================================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /var/www/tp-devops-app || mkdir -p /var/www/tp-devops-app && cd /var/www/tp-devops-app
            git pull origin main
            npm install --production
            pm2 restart tp-devops-app || pm2 start src/app.js --name tp-devops-app
            echo "Déploiement terminé avec succès !"